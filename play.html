<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F9F4DF">
  <title>鲜城 · 周边游玩</title>
  <meta property="og:title" content="鲜城 · 周边游玩">
  <meta property="og:description" content="ZUEL周边吃喝玩乐 · 景点、街道、书店、寺庙、纪念馆一网打尽">
  <meta property="og:image" content="">
  <meta property="og:type" content="website">
  <meta name="description" content="ZUEL周边吃喝玩乐 · 景点、街道、书店、寺庙、纪念馆一网打尽">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/play.css">
</head>
<body>
  <div class="app-shell" id="app">
    <header class="app-header" id="header">
      <div class="header-bar">
        <div class="brand">
          <a href="index.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:6px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="#1A1A23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="brand-dot violet"></span>
            <span class="brand-title">鲜城 · 周边游玩</span>
          </a>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="search-btn" aria-label="搜索">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6.5" stroke="#1A1A23" stroke-width="1.8"/><path d="M14 14L18 18" stroke="#1A1A23" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>

      <div class="search-bar-container hidden" id="search-container">
        <div class="search-input-wrap">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="#999" stroke-width="2"/><path d="M12 12L15 15" stroke="#999" stroke-width="2" stroke-linecap="round"/></svg>
          <input type="text" class="search-input" id="search-input" placeholder="搜索地点名称、分类..." autocomplete="off">
          <button class="icon-btn" id="search-clear" style="display:none;" aria-label="清除">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4L12 12M12 4L4 12" stroke="#999" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>

      <div class="toggle-row" id="campus-toggle">
        <button class="toggle-tab active" data-campus="all">全部校区</button>
        <button class="toggle-tab" data-campus="首义">首义校区</button>
        <button class="toggle-tab" data-campus="南湖">南湖校区</button>
      </div>

      <div class="chip-row" id="category-chips"></div>
    </header>

    <main class="content-area" id="content">
      <div class="section-header">
        <span class="section-title" id="result-title">周边游玩 · 32处</span>
        <span class="section-action" id="count-label">首义 + 南湖</span>
      </div>
      <div id="place-list"></div>
    </main>

    <nav class="tab-bar" id="tab-bar"></nav>

    <div class="floating-cta-group" style="position:fixed;right:16px;bottom:calc(72px + var(--safe-bottom, 0px));z-index:90;display:flex;flex-direction:column;gap:10px;align-items:flex-end;">
      <button class="floating-cta-btn" id="share-btn" style="background:#1A1A23;box-shadow:0 4px 14px rgba(0,0,0,0.2);">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M7 10L13 6M7 10L13 14M7 10H3M17 10C17 11.38 15.88 12.5 14.5 12.5C13.12 12.5 12 11.38 12 10C12 8.62 13.12 7.5 14.5 7.5C15.88 7.5 17 8.62 17 10ZM7 6C7 7.38 5.88 8.5 4.5 8.5C3.12 8.5 2 7.38 2 6C2 4.62 3.12 3.5 4.5 3.5C5.88 3.5 7 4.62 7 6ZM7 14C7 15.38 5.88 16.5 4.5 16.5C3.12 16.5 2 15.38 2 14C2 12.62 3.12 11.5 4.5 11.5C5.88 11.5 7 12.62 7 14Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/></svg>
      </button>
      <button class="floating-cta-btn" id="social-btn" style="background:linear-gradient(135deg, #8B5CF6, #6366F1);">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 5C3 4 4 3 5 3H15C16 3 17 4 17 5V12C17 13 16 14 15 14H8L4 17V5Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/></svg>
        加入游玩群
      </button>
    </div>

    <div class="map-container" id="map-view">
      <div class="map-header">
        <button class="map-back-btn" id="map-back-btn" aria-label="返回列表">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="#1A1A23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span style="font-size:16px; font-weight:600;">游玩地图</span>
      </div>
      <div class="map-canvas-wrapper">
        <div id="amap-canvas"></div>
        <div class="map-placeholder" id="map-placeholder">
          <div class="map-placeholder-icon">🗺️</div>
          <div class="map-placeholder-title">地图加载中...</div>
          <div class="map-placeholder-desc">正在连接高德地图服务</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://webapi.amap.com/loader.js"></script>
  <script src="js/config.js"></script>
  <script src="data/play.js"></script>
  <script src="js/common.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/play.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F9F4DF">
  <title>鲜城 · 味觉地图</title>
  <!-- OG Tags -->
  <meta property="og:title" content="鲜城 · 味觉地图">
  <meta property="og:description" content="武汉美食地图 · 财大周边50家店 + 全城540+家店，师兄师姐带你吃">
  <meta property="og:image" content="">
  <meta property="og:type" content="website">
  <meta name="description" content="武汉美食地图 · 财大周边50家店 + 全城540+家店，师兄师姐带你吃">
  <link rel="stylesheet" href="css/common.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --cream-bg: #F9F4DF;
      --lime: #B9FF66;
      --lime-dark: #65A30D;
      --coral: #FF5A5F;
      --amber: #D4A574;
      --honey: #F5C842;
      --text-primary: #1A1A23;
      --text-secondary: #555555;
      --text-tertiary: #999999;
      --card-bg: #FFFFFF;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--cream-bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    
    /* 装饰背景 */
    body::before {
      content: '';
      position: fixed;
      top: -100px;
      right: -100px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(185,255,102,0.15), transparent);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      left: -100px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,165,116,0.15), transparent);
      pointer-events: none;
    }
    
    .container {
      max-width: 420px;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    
    /* 品牌区 */
    .brand-section {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    
    .brand-logo {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--lime) 0%, var(--amber) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 800;
      color: var(--text-primary);
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(185, 255, 102, 0.3);
    }
    
    .brand-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    
    .brand-subtitle {
      font-size: 14px;
      color: var(--text-tertiary);
      line-height: 1.6;
    }
    
    /* 卡片 */
    .card {
      display: block;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }
    
    .card:active {
      transform: scale(0.97);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      transform: translate(40px, -40px);
      transition: transform 0.4s ease;
    }
    
    .card:hover::before {
      transform: translate(30px, -30px);
    }
    
    .card-campus::before {
      background: radial-gradient(circle, rgba(185,255,102,0.2), transparent 70%);
    }
    
    .card-city::before {
      background: radial-gradient(circle, rgba(212,165,116,0.2), transparent 70%);
    }

    .card-play::before {
      background: radial-gradient(circle, rgba(139,92,246,0.2), transparent 70%);
    }
    
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    
    .card-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    
    .card-campus .card-icon {
      background: linear-gradient(135deg, var(--lime), var(--lime-dark));
    }
    
    .card-city .card-icon {
      background: linear-gradient(135deg, var(--amber), var(--coral));
      color: white;
    }

    .card-play .card-icon {
      background: linear-gradient(135deg, #8B5CF6, #6366F1);
      color: white;
    }
    
    .card-title-group {
      flex: 1;
    }
    
    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    
    .card-subtitle {
      font-size: 12px;
      color: var(--text-tertiary);
    }
    
    .card-stats {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    
    .card-stat {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .card-stat strong {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .card-tag-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    
    .card-tag {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
    }
    
    .card-campus .card-tag {
      background: rgba(185, 255, 102, 0.15);
      color: var(--lime-dark);
    }
    
    .card-city .card-tag {
      background: rgba(212, 165, 116, 0.15);
      color: #B8860B;
    }

    .card-play .card-tag {
      background: rgba(139, 92, 246, 0.15);
      color: #7C3AED;
    }
    
    .card-arrow {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1;
    }
    
    .card:hover .card-arrow {
      right: 20px;
      opacity: 1;
    }
    
    /* 底部信息 */
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 12px;
      color: var(--text-tertiary);
      line-height: 1.8;
      animation: fadeUp 0.8s ease 0.3s forwards;
      opacity: 0;
    }
    
    .footer a {
      color: var(--amber);
      text-decoration: none;
    }
    
    /* 动画 */
    .card:nth-child(2) {
      animation: fadeUp 0.6s ease 0.15s forwards;
      opacity: 0;
    }
    .card:nth-child(3) {
      animation: fadeUp 0.6s ease 0.3s forwards;
      opacity: 0;
    }
    .card:nth-child(4) {
      animation: fadeUp 0.6s ease 0.45s forwards;
      opacity: 0;
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* 群聊入口 */
    .group-entry {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #FF5A5F 0%, #E85D3C 100%);
      border-radius: 20px;
      padding: 18px 24px;
      margin-bottom: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(255, 90, 95, 0.25);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeUp 0.6s ease 0.6s forwards;
      opacity: 0;
    }
    .group-entry:active {
      transform: scale(0.97);
      box-shadow: 0 4px 20px rgba(255, 90, 95, 0.35);
    }
    .group-entry::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
    }
    .group-entry-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      z-index: 1;
    }
    .group-entry-text {
      flex: 1;
      z-index: 1;
    }
    .group-entry-title {
      font-size: 16px;
      font-weight: 700;
      color: white;
      margin-bottom: 2px;
    }
    .group-entry-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }
    .group-entry-arrow {
      z-index: 1;
      opacity: 0.8;
    }

    @media (prefers-color-scheme: dark) {
      /* 保持暖色调，不跟随系统暗色 */
    }
  </style>
</head>
<body>
  <div class="container">

    <a href="play.html" class="card card-play">

      鲜城 · 味觉地图 v1.2.0
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script>
    document.getElementById('groupEntry').addEventListener('click', function() {
      if (window.__SOCIAL_CONFIG__ && window.__SOCIAL_CONFIG__.campus) {

      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F9F4DF">
  <title>鲜城 · 武汉全城美食地图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/wuhan.css">
</head>
<body>
  <div class="app-shell" id="app">
    <!-- Header -->
    <header class="app-header" id="header">
      <div class="header-bar">
        <div class="brand">
          <span class="brand-dot amber"></span>
          <span class="brand-title">鲜城 · 全城版</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="search-btn" aria-label="搜索">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6.5" stroke="#1A1A23" stroke-width="1.8"/><path d="M14 14L18 18" stroke="#1A1A23" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
          <button class="icon-btn" id="sort-btn" aria-label="排序">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 6H17M5 10H15M7 14H13" stroke="#1A1A23" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>

      <!-- 搜索栏（默认隐藏） -->
      <div class="search-bar-container hidden" id="search-container">
        <div class="search-input-wrap">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="#999" stroke-width="2"/><path d="M12 12L15 15" stroke="#999" stroke-width="2" stroke-linecap="round"/></svg>
          <input type="text" class="search-input" id="search-input" placeholder="搜索武汉美食、店铺..." autocomplete="off">
          <button class="icon-btn" id="search-clear" style="display:none;" aria-label="清除">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4L12 12M12 4L4 12" stroke="#999" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>

      <!-- 区域筛选 -->
      <div class="toggle-row" id="area-toggle">
        <!-- JS 动态生成 -->
      </div>

      <!-- 分类筛选 -->
      <div class="chip-row" id="category-chips">
        <!-- JS 动态生成 -->
      </div>

      <!-- 排序菜单 -->
      <div class="sort-dropdown hidden" id="sort-dropdown" style="position:fixed; z-index:50;">
        <div class="sort-menu" id="sort-menu">
          <div class="sort-item active" data-sort="rating">按评分排序</div>
          <div class="sort-item" data-sort="price-low">价格从低到高</div>
          <div class="sort-item" data-sort="price-high">价格从高到低</div>
          <div class="sort-item" data-sort="distance">按距离排序</div>
        </div>
      </div>
    </header>

    <!-- 内容区 -->
    <main class="content-area" id="content">
      <!-- 分类网格 -->
      <div class="category-grid" id="category-grid">
        <!-- JS 动态生成 -->
      </div>

      <!-- 区域标题 -->
      <div class="section-header">
        <span class="section-title" id="result-title">热门推荐</span>
        <span class="section-action" id="sort-label">按评分排序</span>
      </div>

      <!-- 店铺列表 -->
      <div id="shop-list">
        <!-- JS 动态生成 -->
      </div>

      <!-- 加载更多 -->
      <div class="load-more hidden" id="load-more">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <span style="font-size:12px; color:#999; margin-left:8px;">加载更多美食...</span>
      </div>
    </main>

    <!-- 底部导航 -->
    <nav class="tab-bar" id="tab-bar"></nav>

    <!-- 悬浮社群按钮 -->
    <div class="floating-cta">
      <button class="floating-cta-btn" id="social-btn" style="background:#D4A574; box-shadow:var(--shadow-amber);">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 5C3 4 4 3 5 3H15C16 3 17 4 17 5V12C17 13 16 14 15 14H8L4 17V5Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/></svg>
        加入吃货群
      </button>
    </div>

    <!-- 地图视图 -->
    <div class="map-container" id="map-view">
      <div class="map-header">
        <button class="map-back-btn" id="map-back-btn" aria-label="返回列表">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="#1A1A23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span style="font-size:16px; font-weight:600;">武汉美食地图</span>
      </div>
      <div class="map-canvas-wrapper">
        <div id="amap-canvas"></div>
        <div class="map-placeholder" id="map-placeholder">
          <div class="map-placeholder-icon">🗺️</div>
          <div class="map-placeholder-title">地图加载中...</div>
          <div class="map-placeholder-desc">正在连接高德地图服务</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 脚本 -->
  <script src="https://webapi.amap.com/loader.js"></script>
  <script src="js/config.js"></script>
  <script src="data/wuhan.js"></script>
  <script src="js/common.js"></script>
  <script src="js/wuhan.js"></script>
</body>
</html>
